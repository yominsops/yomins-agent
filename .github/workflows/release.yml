name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  packages: write
  id-token: write   # required for Sigstore keyless signing (OIDC token)

jobs:
  # -------------------------------------------------------------------------
  # Build static binaries for linux/amd64 and linux/arm64
  # -------------------------------------------------------------------------
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git describe

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"                   >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)"         >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"         >> $GITHUB_ENV

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/yominsops/yomins-agent/internal/version.Version=${VERSION} \
              -X github.com/yominsops/yomins-agent/internal/version.Commit=${COMMIT} \
              -X github.com/yominsops/yomins-agent/internal/version.BuildDate=${DATE}" \
            -o dist/yomins-agent-linux-amd64 \
            ./cmd/yomins-agent/

      - name: Build linux/arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
          go build \
            -trimpath \
            -ldflags="-s -w \
              -X github.com/yominsops/yomins-agent/internal/version.Version=${VERSION} \
              -X github.com/yominsops/yomins-agent/internal/version.Commit=${COMMIT} \
              -X github.com/yominsops/yomins-agent/internal/version.BuildDate=${DATE}" \
            -o dist/yomins-agent-linux-arm64 \
            ./cmd/yomins-agent/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum yomins-agent-linux-amd64 > yomins-agent-linux-amd64.sha256
          sha256sum yomins-agent-linux-arm64 > yomins-agent-linux-arm64.sha256
          sha256sum yomins-agent-linux-amd64 yomins-agent-linux-arm64 > checksums.txt

      - name: Copy systemd artifacts
        run: |
          cp systemd/yomins-agent.service dist/yomins-agent.service
          cp systemd/apply-upgrade.sh dist/apply-upgrade.sh
          cp install.sh dist/install.sh

      - uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Create GitHub Release and upload all assets
  # -------------------------------------------------------------------------
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist/

      - uses: sigstore/cosign-installer@v3

      - name: Sign checksums with Sigstore
        run: |
          cosign sign-blob \
            --yes \
            --bundle dist/checksums.txt.bundle \
            dist/checksums.txt

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/yomins-agent-linux-amd64 \
            dist/yomins-agent-linux-arm64 \
            dist/yomins-agent-linux-amd64.sha256 \
            dist/yomins-agent-linux-arm64.sha256 \
            dist/checksums.txt \
            dist/checksums.txt.bundle \
            dist/yomins-agent.service \
            dist/apply-upgrade.sh \
            dist/install.sh

  # -------------------------------------------------------------------------
  # Build and push Docker image to ghcr.io
  # -------------------------------------------------------------------------
  docker:
    name: Docker Image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version variables
        run: |
          echo "VERSION=${GITHUB_REF_NAME}"                   >> $GITHUB_ENV
          echo "COMMIT=$(git rev-parse --short HEAD)"         >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)"         >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            DATE=${{ env.DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
